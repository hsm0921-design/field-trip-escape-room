<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🔐 체험학습 방탈출 게임!</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Apple SD Gothic Neo', 'Malgun Gothic', '맑은 고딕', sans-serif;
      background: #0d1117;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ── 배경 벽돌 패턴 ── */
    .bg {
      position: fixed; inset: 0; z-index: -1;
      background:
        repeating-linear-gradient(0deg, transparent, transparent 44px,
          rgba(255,255,255,.04) 44px, rgba(255,255,255,.04) 46px),
        repeating-linear-gradient(90deg, transparent, transparent 66px,
          rgba(255,255,255,.04) 66px, rgba(255,255,255,.04) 68px),
        radial-gradient(ellipse at 50% 0%, #1c2e4a 0%, #0d1117 70%);
    }

    .wrap {
      max-width: 820px;
      margin: 0 auto;
      padding: 20px 16px 40px;
      min-height: 100vh;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
    }

    .screen { width: 100%; }
    .hidden { display: none !important; }

    /* ════════════════════════════
       타이틀 화면
    ════════════════════════════ */
    #titleScreen { text-align: center; animation: zoomIn .6s ease; }

    .title-icon { font-size: 90px; display: block; animation: wobble 2s infinite; }

    .game-title {
      font-size: clamp(2rem, 6vw, 3rem);
      font-weight: 900;
      color: #FFD23F;
      text-shadow: 4px 4px 0 #c97d00, 0 0 30px rgba(255,210,63,.4);
      margin: 8px 0 6px;
    }

    .game-sub {
      font-size: clamp(1rem, 3vw, 1.25rem);
      color: #5df0e8;
      margin-bottom: 24px;
    }

    /* 큰 문 */
    .big-door {
      width: 190px; height: 280px;
      margin: 0 auto 18px;
      position: relative;
      background: linear-gradient(160deg, #7b3f0e, #5a2d0c);
      border-radius: 18px 18px 4px 4px;
      border: 7px solid #3d1c06;
      box-shadow: 0 0 40px rgba(255,150,0,.25), inset 0 0 25px rgba(0,0,0,.4);
    }
    .door-arch {
      position: absolute; top: 8px; left: 50%; transform: translateX(-50%);
      width: 80px; height: 55px;
      background: rgba(135,200,240,.2);
      border: 4px solid #3d1c06;
      border-radius: 50% 50% 0 0;
    }
    .door-locks {
      display: flex; flex-wrap: wrap; justify-content: center;
      gap: 5px; padding: 8px;
      margin-top: 90px;
    }
    .door-lock-icon { font-size: 20px; }

    .hint-text {
      color: rgba(255,255,255,.5);
      font-size: .95rem;
      margin-bottom: 18px;
    }

    .btn-start {
      background: linear-gradient(145deg, #ff6b35, #e04800);
      color: #fff;
      border: none;
      padding: 16px 52px;
      font-size: 1.4rem;
      font-weight: 900;
      border-radius: 50px;
      cursor: pointer;
      box-shadow: 0 7px 0 #8c2400, 0 10px 30px rgba(255,100,50,.4);
      transition: transform .08s, box-shadow .08s;
      font-family: inherit;
    }
    .btn-start:hover { background: linear-gradient(145deg, #ff8555, #ff5510); }
    .btn-start:active { transform: translateY(5px); box-shadow: 0 2px 0 #8c2400; }

    /* ════════════════════════════
       퀴즈 화면
    ════════════════════════════ */
    #quizScreen { animation: slideUp .4s ease; }

    .lock-row {
      display: flex; flex-wrap: wrap; justify-content: center;
      gap: 6px; margin-bottom: 14px;
    }
    .lp {
      font-size: 26px;
      transition: filter .3s, transform .3s;
      filter: grayscale(.6) brightness(.65);
    }
    .lp.done { filter: none; animation: popBounce .45s ease; }

    .meta-row {
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 10px; color: rgba(255,255,255,.65); font-size: .9rem; font-weight: 700;
    }
    .badge {
      background: rgba(255,210,63,.15);
      border: 2px solid #FFD23F;
      color: #FFD23F;
      padding: 3px 14px; border-radius: 20px; font-weight: 900;
    }

    .prog-wrap {
      background: rgba(255,255,255,.1);
      border-radius: 20px; height: 18px;
      overflow: hidden; border: 2px solid rgba(255,255,255,.15);
      margin-bottom: 18px;
    }
    .prog-fill {
      height: 100%;
      background: linear-gradient(90deg, #4ECDC4, #FFD23F);
      border-radius: 20px; transition: width .6s ease;
    }

    .q-card {
      background: rgba(255,255,255,.06);
      border: 2px solid rgba(255,255,255,.12);
      border-radius: 22px;
      padding: 26px 24px 20px;
      margin-bottom: 16px;
      backdrop-filter: blur(8px);
      box-shadow: 0 16px 48px rgba(0,0,0,.35);
    }
    .q-label {
      font-size: .82rem; color: #5df0e8; font-weight: 700;
      letter-spacing: 2px; margin-bottom: 6px;
    }
    .q-emoji { font-size: 2.6rem; display: block; margin-bottom: 8px; }
    .q-text {
      font-size: clamp(1.1rem, 3vw, 1.45rem);
      font-weight: 700; color: #fff; line-height: 1.6;
    }

    .opts { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

    .opt {
      background: rgba(255,255,255,.07);
      border: 3px solid rgba(255,255,255,.18);
      border-radius: 14px;
      padding: 16px 14px;
      font-size: clamp(.95rem, 2.5vw, 1.1rem);
      font-weight: 700; color: #fff;
      cursor: pointer; text-align: left;
      transition: background .15s, border-color .15s, transform .15s, box-shadow .15s;
      font-family: inherit; line-height: 1.45;
    }
    .opt:hover:not(:disabled) {
      background: rgba(78,205,196,.22);
      border-color: #4ECDC4;
      transform: translateY(-3px);
      box-shadow: 0 8px 20px rgba(78,205,196,.3);
    }
    .opt:disabled { cursor: default; }
    .opt.hit {
      background: rgba(0,200,150,.28);
      border-color: #00c896;
      color: #00ffd4;
      animation: correctFlash .45s ease;
    }
    .opt.miss {
      background: rgba(255,50,70,.25);
      border-color: #ff4757;
      color: #ff8090;
      animation: shakeIt .45s ease;
    }
    .opt-num {
      display: inline-flex; align-items: center; justify-content: center;
      width: 26px; height: 26px;
      background: rgba(255,255,255,.15);
      border-radius: 50%;
      font-size: .82rem; margin-right: 8px; flex-shrink: 0;
      vertical-align: middle;
    }

    .feedback {
      border-radius: 14px; padding: 14px 18px;
      font-size: 1.25rem; font-weight: 900;
      text-align: center; margin-top: 14px;
      animation: popBounce .3s ease;
    }
    .feedback.ok { background: rgba(0,200,150,.2); color: #00ffd4; border: 2px solid #00c896; }
    .feedback.no { background: rgba(255,50,70,.2); color: #ff8090; border: 2px solid #ff4757; }

    /* ════════════════════════════
       클리어 화면
    ════════════════════════════ */
    #winScreen { text-align: center; animation: zoomIn .7s ease; }

    .win-icon { font-size: 110px; display: block; animation: bounce 0.7s infinite; }
    .win-title {
      font-size: clamp(2rem, 7vw, 3.2rem);
      font-weight: 900;
      background: linear-gradient(135deg, #FFD23F, #ff6b35);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      margin: 8px 0 10px;
    }
    .win-sub { font-size: 1.2rem; color: #5df0e8; margin-bottom: 20px; }

    .door-open-anim {
      font-size: 90px; display: block;
      animation: doorSwing 1.2s ease forwards;
    }

    .win-msg {
      color: rgba(255,255,255,.75);
      font-size: clamp(1rem, 2.5vw, 1.15rem);
      line-height: 1.9; margin: 20px 0 10px;
    }

    .btn-replay {
      background: linear-gradient(145deg, #4ECDC4, #2baea0);
      color: #fff; border: none;
      padding: 15px 42px;
      font-size: 1.3rem; font-weight: 900;
      border-radius: 50px; cursor: pointer;
      box-shadow: 0 6px 0 #1a7a74, 0 8px 28px rgba(78,205,196,.4);
      transition: transform .08s, box-shadow .08s;
      font-family: inherit; margin-top: 10px;
    }
    .btn-replay:active { transform: translateY(4px); box-shadow: 0 2px 0 #1a7a74; }

    /* 사운드 토글 */
    .sound-btn {
      position: fixed; top: 14px; right: 14px;
      background: rgba(255,255,255,.12);
      border: 2px solid rgba(255,255,255,.25);
      border-radius: 50%; width: 44px; height: 44px;
      font-size: 1.3rem; cursor: pointer; z-index: 999;
      display: flex; align-items: center; justify-content: center;
      transition: background .2s;
    }
    .sound-btn:hover { background: rgba(255,255,255,.2); }

    /* 파티클 */
    .confetti {
      position: fixed; border-radius: 3px;
      pointer-events: none; z-index: 9999;
      animation: fall linear forwards;
    }

    /* ════════════ 애니메이션 ════════════ */
    @keyframes zoomIn {
      from { opacity: 0; transform: scale(.85); }
      to   { opacity: 1; transform: scale(1); }
    }
    @keyframes slideUp {
      from { opacity: 0; transform: translateY(32px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes wobble {
      0%,100% { transform: rotate(-6deg) scale(1); }
      50%      { transform: rotate(6deg) scale(1.08); }
    }
    @keyframes bounce {
      0%,100% { transform: translateY(0); }
      50%      { transform: translateY(-18px); }
    }
    @keyframes popBounce {
      0%   { transform: scale(.5); opacity: 0; }
      70%  { transform: scale(1.15); }
      100% { transform: scale(1); opacity: 1; }
    }
    @keyframes shakeIt {
      0%,100% { transform: translateX(0); }
      20% { transform: translateX(-9px); }
      40% { transform: translateX(9px); }
      60% { transform: translateX(-7px); }
      80% { transform: translateX(7px); }
    }
    @keyframes correctFlash {
      0%   { transform: scale(1); }
      40%  { transform: scale(1.06); }
      100% { transform: scale(1); }
    }
    @keyframes doorSwing {
      0%   { transform: perspective(500px) rotateY(0deg); }
      100% { transform: perspective(500px) rotateY(-55deg); opacity: .7; }
    }
    @keyframes fall {
      0%   { transform: translateY(-120px) rotate(0deg); opacity: 1; }
      100% { transform: translateY(110vh) rotate(540deg); opacity: 0; }
    }

    /* 반응형 */
    @media (max-width: 520px) {
      .opts { grid-template-columns: 1fr; }
      .big-door { width: 150px; height: 230px; }
    }
  </style>
</head>
<body>
<div class="bg"></div>

<!-- 사운드 토글 -->
<button class="sound-btn" id="soundBtn" title="소리 켜기/끄기" onclick="toggleSound()">🔊</button>

<div class="wrap">

  <!-- ══ 타이틀 ══ -->
  <div class="screen" id="titleScreen">
    <span class="title-icon">🔐</span>
    <div class="game-title">체험학습 방탈출!</div>
    <div class="game-sub">10개 자물쇠를 모두 풀면 문이 열려요!</div>

    <div class="big-door">
      <div class="door-arch"></div>
      <div class="door-locks" id="titleDoorLocks"></div>
    </div>

    <p class="hint-text">🎯 체험학습 정보 10가지를 맞혀야 탈출!</p>
    <button class="btn-start" onclick="startGame()">🚀 도전 시작!</button>
  </div>

  <!-- ══ 퀴즈 ══ -->
  <div class="screen hidden" id="quizScreen">
    <div class="lock-row" id="lockRow"></div>

    <div class="meta-row">
      <span id="qCounter">문제 1 / 10</span>
      <span class="badge" id="scoreBadge">✅ 0개 맞음</span>
    </div>

    <div class="prog-wrap">
      <div class="prog-fill" id="progFill" style="width:0%"></div>
    </div>

    <div class="q-card">
      <div class="q-label" id="qLabel">🔐 문제 1</div>
      <span class="q-emoji" id="qEmoji">❓</span>
      <div class="q-text" id="qText"></div>
    </div>

    <div class="opts" id="optsGrid"></div>
    <div class="feedback hidden" id="feedback"></div>
  </div>

  <!-- ══ 클리어 ══ -->
  <div class="screen hidden" id="winScreen">
    <span class="win-icon">🎊</span>
    <div class="win-title">탈출 성공! 🎉</div>
    <div class="win-sub">10개 자물쇠를 모두 풀었어요!</div>
    <span class="door-open-anim">🚪</span>
    <p class="win-msg">
      🌟 정말 훌륭해요! 체험학습 준비 완료!<br>
      📅 <strong style="color:#FFD23F">6월 2일 화요일</strong> 즐거운 체험학습 되세요!<br>
      🎭 <strong style="color:#5df0e8">틴틴홀</strong>에서 신나는 공연 기대해요!
    </p>
    <button class="btn-replay" onclick="replayGame()">🔄 다시 도전!</button>
  </div>

</div><!-- /.wrap -->

<script>
/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   문제 데이터 (슬라이드 기반)
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
const QS = [
  {
    emoji: "📅",
    text: "체험학습은 몇 월 며칠, 무슨 요일인가요?",
    opts: ["5월 2일 월요일", "6월 2일 화요일", "6월 3일 수요일", "7월 2일 목요일"],
    ans: 1
  },
  {
    emoji: "🎭",
    text: "체험학습을 하는 극장(공연장)의 이름은 무엇인가요?",
    opts: ["꿈꾸는홀", "어린이홀", "틴틴홀", "별빛홀"],
    ans: 2
  },
  {
    emoji: "⏰",
    text: "몇 시까지 출석 확인을 마치고 극장으로 이동해야 하나요?",
    opts: ["8시 30분", "9시 00분", "10시 00분", "9시 30분"],
    ans: 3
  },
  {
    emoji: "🎬",
    text: "공연 관람 시간은 몇 분인가요?",
    opts: ["60분", "80분", "100분", "120분"],
    ans: 2
  },
  {
    emoji: "🏠",
    text: "공연 관람이 끝난 후 하교는 어떻게 하나요?",
    opts: ["혼자서 집에 간다", "선생님이랑 다 같이 간다", "모둠별로 하교한다", "버스로 학교에 돌아온다"],
    ans: 2
  },
  {
    emoji: "🤒",
    text: "체험학습 중에 몸이 아프거나 이상이 생기면 어떻게 해야 하나요?",
    opts: ["그냥 참는다", "혼자 병원에 간다", "즉시 선생님께 보고한다", "친구에게만 말한다"],
    ans: 2
  },
  {
    emoji: "🚶",
    text: "체험학습 중에 혼자 따로 개별 행동을 해도 될까요?",
    opts: ["괜찮아요!", "조금은 괜찮아요", "절대 하면 안 돼요!", "선생님 몰래 하면 돼요"],
    ans: 2
  },
  {
    emoji: "🛣️",
    text: "길을 걸어갈 때 반드시 어디로 다녀야 하나요?",
    opts: ["차도", "자전거 도로", "어디든 괜찮아요", "인도(보도)"],
    ans: 3
  },
  {
    emoji: "🚦",
    text: "건널목에서 길을 건널 때 어떻게 해야 하나요?",
    opts: [
      "빨리 뛰어서 건넌다",
      "차가 없으면 아무 때나 건넌다",
      "신호등 신호에 따라 좌우를 살핀 후 조심히 건넌다",
      "눈 감고 빨리 건넌다"
    ],
    ans: 2
  },
  {
    emoji: "🙅",
    text: "누군가 내 몸을 만져서 싫은 느낌이 들면 어떻게 해야 하나요?",
    opts: [
      "그냥 참는다",
      "모른 척한다",
      "무조건 때린다",
      "거부 의사를 표시하거나 선생님께 도움을 요청한다"
    ],
    ans: 3
  }
];

const OK_MSGS = [
  "🎉 정답이에요! 대단해요!",
  "⭐ 맞았어요! 완벽해요!",
  "🌟 정확해요! 최고예요!",
  "👏 짝짝짝! 맞았어요!",
  "🔥 완벽해요! 멋져요!",
  "💯 100점! 훌륭해요!"
];

const NO_MSGS = [
  "❌ 틀렸어요! 다시 생각해봐요~",
  "💭 아쉬워요! 한 번 더 도전!",
  "🤔 잘 생각해봐요~ 할 수 있어요!"
];

/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   오디오 엔진 (Web Audio API)
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
let actx = null;
let soundOn = true;
let bgLoopId = null;

function ac() {
  if (!actx) actx = new (window.AudioContext || window.webkitAudioContext)();
  if (actx.state === 'suspended') actx.resume();
  return actx;
}

function tone(freq, dur, type='sine', vol=0.28, delay=0) {
  if (!soundOn) return;
  const ctx = ac();
  const o = ctx.createOscillator();
  const g = ctx.createGain();
  o.connect(g); g.connect(ctx.destination);
  o.type = type; o.frequency.value = freq;
  const t0 = ctx.currentTime + delay;
  g.gain.setValueAtTime(vol, t0);
  g.gain.exponentialRampToValueAtTime(0.0001, t0 + dur);
  o.start(t0); o.stop(t0 + dur + 0.01);
}

function noise(dur, vol=0.15, delay=0) {
  if (!soundOn) return;
  const ctx = ac();
  const buf = ctx.createBuffer(1, ctx.sampleRate * dur, ctx.sampleRate);
  const d = buf.getChannelData(0);
  for (let i = 0; i < d.length; i++) d[i] = Math.random() * 2 - 1;
  const src = ctx.createBufferSource();
  const g = ctx.createGain();
  src.buffer = buf; src.connect(g); g.connect(ctx.destination);
  const t0 = ctx.currentTime + delay;
  g.gain.setValueAtTime(vol, t0);
  g.gain.exponentialRampToValueAtTime(0.0001, t0 + dur);
  src.start(t0); src.stop(t0 + dur + 0.01);
}

function sndClick() {
  tone(700, .08, 'sine', .18);
  tone(1000, .12, 'sine', .12, .06);
}

function sndCorrect() {
  // 밝고 경쾌한 상승 아르페지오
  tone(523, .12, 'square', .22, 0);
  tone(659, .12, 'square', .22, .1);
  tone(784, .12, 'square', .22, .2);
  tone(1047, .28, 'square', .22, .3);
  noise(.06, .12, .3);
}

function sndWrong() {
  // 웅웅 버저
  tone(220, .14, 'sawtooth', .28, 0);
  tone(196, .14, 'sawtooth', .28, .14);
  tone(165, .22, 'sawtooth', .28, .28);
  noise(.1, .08, 0);
}

function sndUnlock() {
  tone(900, .05, 'square', .2, 0);
  tone(1400, .1, 'square', .18, .05);
  noise(.05, .08, .05);
}

function sndFanfare() {
  // 승리 팡파르 멜로디
  const m = [
    [523,.1],[523,.1],[523,.1],[659,.32],
    [784,.1],[784,.1],[784,.1],[1047,.42],
    [880,.14],[784,.14],[698,.14],[1047,.55]
  ];
  let t = 0;
  m.forEach(([f,d]) => { tone(f, d, 'square', .22, t); t += d + .03; });
  // 하모니
  const h = [
    [659,.1],[659,.1],[659,.1],[784,.32],
    [988,.1],[988,.1],[988,.1],[1319,.42]
  ];
  t = 0;
  h.forEach(([f,d]) => { tone(f, d, 'triangle', .12, t); t += d + .03; });
}

/* 배경음악 - 단순 반복 멜로디 */
let bgPlaying = false;
const BG_NOTES = [
  [392,.35],[440,.35],[494,.35],[523,.7],
  [494,.35],[440,.35],[392,.7],
  [349,.35],[392,.35],[440,.35],[392,.7],
  [330,.35],[349,.35],[392,.35],[349,1.0]
];

function startBgMusic() {
  if (!soundOn || bgPlaying) return;
  bgPlaying = true;
  let idx = 0;
  const total = BG_NOTES.reduce((s,[,d])=>s+d+.02,0);

  function schedBatch(startDelay) {
    let t = startDelay;
    BG_NOTES.forEach(([f,d]) => {
      tone(f, d*.85, 'triangle', .07, t);
      t += d + .02;
    });
  }
  schedBatch(0);
  // 반복
  bgLoopId = setInterval(() => {
    if (!soundOn || !bgPlaying) { clearInterval(bgLoopId); bgPlaying=false; return; }
    schedBatch(.1);
  }, total * 1000 - 100);
}

function stopBgMusic() {
  bgPlaying = false;
  if (bgLoopId) { clearInterval(bgLoopId); bgLoopId = null; }
}

function toggleSound() {
  soundOn = !soundOn;
  document.getElementById('soundBtn').textContent = soundOn ? '🔊' : '🔇';
  if (soundOn && document.getElementById('quizScreen').classList.contains('hidden') === false) {
    startBgMusic();
  } else if (!soundOn) {
    stopBgMusic();
  }
}

/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   게임 상태
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
let cur = 0;
let score = 0;
let canAns = true;

/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   초기화
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
(function initTitle() {
  const el = document.getElementById('titleDoorLocks');
  for (let i = 0; i < 10; i++) {
    const s = document.createElement('span');
    s.className = 'door-lock-icon';
    s.textContent = '🔒';
    el.appendChild(s);
  }
})();

/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   게임 흐름
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
function startGame() {
  sndClick();
  cur = 0; score = 0; canAns = true;
  show('quizScreen');
  initLockRow();
  renderQ();
  startBgMusic();
}

function show(id) {
  ['titleScreen','quizScreen','winScreen'].forEach(s=>{
    document.getElementById(s).classList.toggle('hidden', s !== id);
  });
}

function initLockRow() {
  const r = document.getElementById('lockRow');
  r.innerHTML = '';
  for (let i = 0; i < 10; i++) {
    const s = document.createElement('span');
    s.className = 'lp';
    s.id = 'lp' + i;
    s.textContent = '🔒';
    r.appendChild(s);
  }
}

function unlockPip(i) {
  const p = document.getElementById('lp' + i);
  if (p) { p.textContent = '🔓'; p.classList.add('done'); }
}

function renderQ() {
  const q = QS[cur];
  document.getElementById('qLabel').textContent = `🔐 문제 ${cur+1}`;
  document.getElementById('qCounter').textContent = `문제 ${cur+1} / 10`;
  document.getElementById('scoreBadge').textContent = `✅ ${score}개 맞음`;
  document.getElementById('qEmoji').textContent = q.emoji;
  document.getElementById('qText').textContent = q.text;
  document.getElementById('progFill').style.width = `${(cur/10)*100}%`;

  const fb = document.getElementById('feedback');
  fb.classList.add('hidden');
  fb.className = 'feedback hidden';

  const labels = ['①','②','③','④'];
  const grid = document.getElementById('optsGrid');
  grid.innerHTML = '';
  q.opts.forEach((txt, i) => {
    const b = document.createElement('button');
    b.className = 'opt';
    b.innerHTML = `<span class="opt-num">${labels[i]}</span>${txt}`;
    b.onclick = () => pick(i, q.ans);
    grid.appendChild(b);
  });
}

function pick(sel, ans) {
  if (!canAns) return;
  canAns = false;

  const btns = document.querySelectorAll('.opt');
  btns.forEach(b => b.disabled = true);

  const fb = document.getElementById('feedback');

  if (sel === ans) {
    btns[sel].classList.add('hit');
    sndCorrect();
    sndUnlock();
    score++;
    unlockPip(cur);
    document.getElementById('scoreBadge').textContent = `✅ ${score}개 맞음`;

    fb.textContent = OK_MSGS[Math.floor(Math.random() * OK_MSGS.length)];
    fb.className = 'feedback ok';

    setTimeout(() => {
      cur++;
      if (cur >= QS.length) {
        doWin();
      } else {
        renderQ();
        canAns = true;
      }
    }, 1400);

  } else {
    btns[sel].classList.add('miss');
    btns[ans].classList.add('hit');
    sndWrong();

    fb.textContent = NO_MSGS[Math.floor(Math.random() * NO_MSGS.length)];
    fb.className = 'feedback no';

    // 3초 후 같은 문제 다시 시도
    setTimeout(() => {
      btns.forEach(b => {
        b.disabled = false;
        b.classList.remove('hit','miss');
      });
      fb.className = 'feedback hidden';
      canAns = true;
    }, 3000);
  }
}

function doWin() {
  document.getElementById('progFill').style.width = '100%';
  stopBgMusic();
  setTimeout(() => {
    show('winScreen');
    sndFanfare();
    spawnConfetti();
  }, 400);
}

function replayGame() {
  sndClick();
  stopBgMusic();
  show('titleScreen');
}

/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   컨페티 파티클
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
function spawnConfetti() {
  const cols = ['#FF6B35','#FFD23F','#4ECDC4','#FF4757','#7BED9F','#A29BFE','#FD79A8','#fff'];
  const shapes = ['▲','●','■','★','♦','♥'];
  for (let i = 0; i < 100; i++) {
    setTimeout(() => {
      const el = document.createElement('div');
      el.className = 'confetti';
      el.textContent = shapes[Math.floor(Math.random() * shapes.length)];
      el.style.cssText = `
        left:${Math.random()*100}vw;
        top:-30px;
        color:${cols[Math.floor(Math.random()*cols.length)]};
        font-size:${10+Math.random()*14}px;
        animation-duration:${2.5+Math.random()*3.5}s;
        animation-delay:0s;
        background:transparent;
      `;
      document.body.appendChild(el);
      setTimeout(() => el.remove(), 6500);
    }, i * 55);
  }
}
</script>
